description: >-
  FinOps view of Unkey spend. Unkey's platform is open source (AGPL) and free to
  self-host, in which model the cost is your own compute, memory, storage, and
  network with no vendor invoice. Unkey's managed offering is subscription plus
  usage: Free, Starter ($5/mo), Pro ($25/mo), and Business ($50/mo) tiers each
  include an equal dollar amount of monthly usage credits, and spend above the
  credits follows real usage metered on compute (vCPU-seconds), memory
  (GB-seconds), and egress (GB). Enterprise agreements cover custom limits and
  dedicated infrastructure.
notes: >-
  Metered rates observed on the pricing page: vCPU-second $0.000006944,
  memory GB-second $0.000003472, egress $0.05/GB, with included monthly credits
  equal to the plan price. Confirm current rates and credit amounts during
  reconciliation. For self-hosted deployments, the dominant cost is the
  infrastructure running Unkey rather than a license fee.
