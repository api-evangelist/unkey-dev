meters:
- name: subscription
  description: Monthly plan subscription (Starter/Pro/Business), each bundling equal dollar usage credits.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: compute_vcpu_seconds
  description: vCPU-seconds of compute consumed above the included credits, billed at $0.000006944 each.
  unit: vcpu_seconds
  aggregation: sum
  dimensions:
  - account
  - deployment
  - region
- name: memory_gb_seconds
  description: GB-seconds of memory consumed above the included credits, billed at $0.000003472 each.
  unit: gb_seconds
  aggregation: sum
  dimensions:
  - account
  - deployment
  - region
- name: egress_gb
  description: Gigabytes of egress above the included credits, billed at $0.05/GB.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - deployment
  - region
- name: self_hosted_compute
  description: Infrastructure cost of running the self-hosted Unkey platform (no Unkey invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track compute, memory, and egress usage against monthly credits per deployment and region; on self-hosted, monitor the underlying infrastructure cost.
- name: Allocation
  description: Name projects, deployments, and regions per workload/team so metered usage maps to internal cost centers.
- name: Optimization
  description: Right-size instance vCPU/memory, keep hot verifications close to consumers to reduce egress, and self-host to trade vendor fees for owned infrastructure when volume is high.
- name: Accountability
  description: Assign owners per project/deployment and review monthly usage against included credits and plan tier.
