aid: unkey-dev
url: https://raw.githubusercontent.com/api-evangelist/unkey-dev/refs/heads/main/apis.yml
name: Unkey
kind: company
description: Unkey is an open-source developer platform for modern APIs, providing
  globally distributed API key management, authentication, and rate limiting. The
  platform lets API providers issue, verify, update, reroll, and revoke keys with
  metadata, expiration, usage credits, permissions, and roles, plus standalone rate
  limiting, identities, RBAC, and key-verification analytics. Unkey exposes an
  RPC-style REST API (all POST) with a stable v2 at api.unkey.com and a legacy v1 at
  api.unkey.dev, authenticated with Bearer root keys.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- API Keys
- Rate Limiting
- Authentication
- Access Control
- Identity
- RBAC
- Analytics
- Open Source
