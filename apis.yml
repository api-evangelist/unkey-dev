  description: Full API key lifecycle - create, verify, get, update, delete, reroll,
    updateCredits, and whoami. Keys carry metadata, expiration, usage credits,
    external identity links, permissions, and roles. keys.verifyKey is the hot-path
    endpoint API providers call to authenticate and authorize each request.
