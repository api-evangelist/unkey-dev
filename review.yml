  endpointsModeledNote: |
    The v1 endpoints above are documented by Unkey as the legacy surface and are
    listed as a second (legacy) server in the OpenAPI. They were confirmed to
    exist from Unkey docs and the v1-to-v2 migration guide, but this entry
    models the current v2 paths in detail rather than enumerating every v1 path.
sources:
  - url: https://www.unkey.com/docs/api-reference/overview
    type: Documentation
    note: RPC-style v2 API, base https://api.unkey.com, Bearer root-key auth, consistent response envelope. No WebSocket mentioned.
  - url: https://www.unkey.com/docs/api-reference/keys/verify
    type: APIReference
    note: keys.verifyKey - the hot-path verification endpoint. HTTP POST.
  - url: https://www.unkey.com/docs/api-reference/ratelimits/limit
    type: APIReference
    note: Standalone ratelimit.limit endpoint. HTTP POST.
  - url: https://www.unkey.com/docs/api-reference/v1/migration/ratelimiting
    type: Documentation
    note: v1-to-v2 migration guide confirming the legacy /v1/ratelimits.* surface at api.unkey.dev.
  - url: https://github.com/unkeyed/unkey
    type: SourceCode
    note: Open-source (AGPL-3.0) platform, self-hostable, written primarily in Go.
  - url: https://www.unkey.com/pricing
    type: Pricing
    note: Subscription + usage-based (compute/memory/egress) pricing with included monthly credits per tier.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Unkey's public API is entirely
    request/response REST (RPC-style, all POST). No AsyncAPI document was created
    because there is no server-push transport (WebSocket or SSE) on Unkey's own
    API to model; event delivery to customers happens via outbound webhooks,
    which are ordinary HTTP callbacks handled on the customer endpoint.
  overlapNote: |
    A separate catalog entry exists under the slug `unkey`. This `unkey-dev`
    entry is a distinct, freshly researched build that breaks Unkey's surface
    into nine per-namespace APIs grounded in the published v2 OpenAPI. The two
    overlap in subject matter by design.
