aid: unkey-dev
name: Unkey
review:
  question: Does Unkey expose a documented public WebSocket API?
  answer: false
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Unkey's public API is an RPC-style REST
    API in which every operation is a request/response HTTP POST (for example
    POST /v2/keys.verifyKey). There is no server-push transport - no WebSocket
    and no Server-Sent Events - on Unkey's own API to model. Unkey does emit
    events to customers via outbound webhooks (server-to-endpoint HTTP), but
    those are ordinary HTTP callbacks, not a bidirectional or streaming socket,
    and are configured/consumed on the customer's own endpoint.
findings:
  summary: |
    Unkey does not publish a documented public WebSocket API. Unkey is an
    open-source developer platform for API key management, authentication, and
    rate limiting. Its public API is RPC-style REST: all operations are HTTP
    POST calls grouped into service namespaces (keys, apis, ratelimit,
    identities, permissions, analytics, deploy, liveness). The stable v2 API is
    served from https://api.unkey.com under /v2/* paths; a legacy v1 API is
    served from https://api.unkey.dev under /v1/* paths. Authentication is HTTP
    Bearer with a root key (Authorization: Bearer unkey_xxx). Responses use a
    consistent envelope (meta.requestId + data, plus pagination on list
    endpoints, or a structured error object). No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented anywhere in
    Unkey's API reference. Server-push to customers is delivered via outbound
    webhooks, not WebSocket.
  openSource: |
    The full Unkey platform is open source (AGPL-3.0) and self-hostable
    (github.com/unkeyed/unkey, written primarily in Go). A managed offering runs
    the same platform under a subscription-plus-usage pricing model. Both the
    self-hosted and managed variants expose the same RPC-style REST API surface.
  apiVersions: |
    v2 is current (base https://api.unkey.com, /v2/* paths) and is what this
    entry primarily models. v1 is legacy (base https://api.unkey.dev, /v1/*
    paths); it exposes an equivalent surface with slightly different naming (for
    example /v1/identities.create vs /v2/identities.createIdentity, and
    /v1/ratelimits.* vs /v2/ratelimit.*). Unkey publishes a v1-to-v2 migration
    guide.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.unkey.com
      documented: true
      note: RPC-style v2 API; every operation is an HTTP POST to /v2/<namespace>.<method>.
    - protocol: REST
      scheme: https
      baseURL: https://api.unkey.dev
      documented: true
      note: Legacy v1 API under /v1/* paths.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound webhooks POST key/identity events to a customer-configured HTTP endpoint. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Unkey's API reference (v1 or v2) as of the review date.
